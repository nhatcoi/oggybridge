name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'macos-14'
            args: '--bundles dmg'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: setup node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libsoup-3.0-dev

      - name: install frontend dependencies
        run: npm install

      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          tagName: v__VERSION__
          releaseName: 'OggyBridge v__VERSION__'
          releaseBody: 'See the assets to download this version and install OggyBridge.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Update updater.json
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          VERSION=$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")
          
          # Find signature files dynamically in either root target or src-tauri target
          APPIMAGE_SIG_FILE=$(find target/release/bundle/appimage src-tauri/target/release/bundle/appimage -name "*.AppImage.sig" 2>/dev/null | head -1 || true)
          DEB_SIG_FILE=$(find target/release/bundle/deb src-tauri/target/release/bundle/deb -name "*.deb.sig" 2>/dev/null | head -1 || true)
          
          APPIMAGE_SIG=$(cat "$APPIMAGE_SIG_FILE" 2>/dev/null || echo "")
          DEB_SIG=$(cat "$DEB_SIG_FILE" 2>/dev/null || echo "")
          
          # Construct updater.json
          cat <<EOF > updater.json
          {
            "version": "${VERSION}",
            "notes": "Release version ${VERSION}",
            "pub_date": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "platforms": {
              "linux-x86_64": {
                "signature": "${APPIMAGE_SIG}",
                "url": "https://github.com/nhatcoi/oggybridge/releases/download/v${VERSION}/OggyBridge_${VERSION}_amd64.AppImage"
              },
              "linux-deb-x86_64": {
                "signature": "${DEB_SIG}",
                "url": "https://github.com/nhatcoi/oggybridge/releases/download/v${VERSION}/OggyBridge_${VERSION}_amd64.deb"
              }
            }
          }
          EOF
          
          # Configure Git and push updater.json back to main branch
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add updater.json
          git commit -m "chore: update updater.json for v${VERSION} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main || echo "Failed to push updater.json"
